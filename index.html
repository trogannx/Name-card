<!DOCTYPE html>
<html>
  <head>
    <title>Trogan | Developer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="profile-card">
      <img src="https://i.ibb.co/pBwXfFT1/ckx9yv.jpg" alt="profile pic">
      <h1>Trogan</h1>
      <p class="bio">Aspiring Web & Web3 Developer</p>
      <div class="skills">
        <h3>My Skills</h3>
        <div class="skill-tags">
          <span>HTML</span>
          <span>CSS</span>
          <span>JavaScript</span>
          <span>Web3 (soon)</span>
        </div>
      </div>
      <div class="contact">
        <h3>Contact Me</h3>
        <input type="text" id="msgInput" placeholder="Send me a message">
        <button onclick="sendMessage()">Send</button>
        <p id="response"></p>
      </div>
      <button class="toggle-btn" onclick="toggleMode()">🌙 Dark / Light Mode</button>
    </div>
  </body>
</html>
